<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Christopher Lyod B. Mercado</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #070707;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container { text-align: center; padding: 24px; }
    .code {
      font-size: clamp(96px, 20vw, 180px);
      font-weight: 900;
      background: linear-gradient(135deg, #f97316, #d946ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -6px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      margin-bottom: 12px;
      color: #f5f5f5;
    }
    p {
      font-size: 15px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .btn {
      display: inline-flex;
      padding: 14px 34px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      background: linear-gradient(135deg, #f97316, #d946ef);
      color: #fff;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(249, 115, 22, 0.25);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist or has been moved.<br>Let's get you back on track.</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
